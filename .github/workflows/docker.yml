# Managed by kapps scripts/publish-busabase-repo.ts — edit the template there,
# not in this repo (the open-source sync overwrites it).
#
# Builds the Busabase image from apps/busabase/Dockerfile and pushes multi-arch
# (amd64 + arm64) to GHCR and Docker Hub, on GitHub's official ubuntu-latest
# runner. After publishing, it can dispatch the private deploy workflow.
#
# Required secrets: DOCKERHUB_TOKEN (a Docker Hub access token for the `busabase`
# org with push rights). GHCR uses the built-in GITHUB_TOKEN.
# Required for deploy dispatch: CR_PAT, DEPLOY_REPOSITORY (for example,
# vikadata/ops-manager), and DEPLOY_EVENT_TYPE (for example, deploy-bika).
name: Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/busabase/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/docker.yml"
      # docs/readme assets don't affect the image — don't rebuild on those edits
      - "!apps/busabase/README.md"
      - "!apps/busabase/docs/**"
      - "!apps/busabase/public/assets/**"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tags: ${{ steps.compute.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version and tags
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(jq -r '.version' apps/busabase/package.json)
          short_sha="${GITHUB_SHA::7}"
          ref_slug=$(printf '%s' "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9_.-]#-#g')

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            build_meta="release.${GITHUB_RUN_NUMBER}.${short_sha}"
          else
            build_meta="alpha.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi
          semver="${package_version}-${build_meta}"

          tags="${semver}
          v${semver}
          ${package_version}
          ${ref_slug}
          ${ref_slug}-${short_sha}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags}
          latest"
          fi
          tags=$(printf '%s\n' "${tags}" | sed 's/^[[:space:]]*//')

          {
            echo "version=${semver}"
            echo "tags<<__TAGS_EOF__"
            echo "${tags}"
            echo "__TAGS_EOF__"
          } >> "$GITHUB_OUTPUT"

          echo "Version: ${semver}"
          echo "Tags:"
          echo "${tags}"

  build:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: busabase
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: tags
        shell: bash
        env:
          REGISTRIES: |
            ghcr.io/${{ github.repository_owner }}/busabase
            docker.io/busabase/busabase
          TAGS: ${{ needs.version.outputs.tags }}
        run: |
          set -euo pipefail
          refs=()
          while IFS= read -r registry; do
            [ -n "$registry" ] || continue
            while IFS= read -r tag; do
              [ -n "$tag" ] && refs+=("${registry}:${tag}")
            done <<< "$TAGS"
          done <<< "$REGISTRIES"
          {
            echo "tags<<__TAGS_EOF__"
            printf '%s\n' "${refs[@]}"
            echo "__TAGS_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/busabase/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch internal deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.CR_PAT }}
          DEPLOY_REPOSITORY: ${{ secrets.DEPLOY_REPOSITORY }}
          DEPLOY_EVENT_TYPE: ${{ secrets.DEPLOY_EVENT_TYPE }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "CR_PAT is not configured; skipping deploy dispatch."
            exit 0
          fi
          if [ -z "${DEPLOY_REPOSITORY:-}" ]; then
            echo "DEPLOY_REPOSITORY is not configured; skipping deploy dispatch."
            exit 0
          fi
          if [ -z "${DEPLOY_EVENT_TYPE:-}" ]; then
            echo "DEPLOY_EVENT_TYPE is not configured; skipping deploy dispatch."
            exit 0
          fi

          version="${{ needs.version.outputs.version }}"

          echo "Dispatching deploy for busabase @ ${version}"
          PAYLOAD=$(jq -nc \
            --arg semver "${version}" \
            --arg event_type "${DEPLOY_EVENT_TYPE}" \
            --arg image "ghcr.io/${{ github.repository_owner }}/busabase:${version}" \
            --arg arch "$(uname -m)" \
            '{event_type:$event_type,client_payload:{SEMVER_FULL:$semver,edition:"busabase",app:"busabase",containerName:"busabase",image:$image,arch:$arch}}')
          curl --fail -sS -X POST "https://api.github.com/repos/${DEPLOY_REPOSITORY}/dispatches" \
            -H "Authorization: token ${DEPLOY_TOKEN}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Content-Type: application/json" \
            --data "${PAYLOAD}"
          echo "Deploy dispatch sent."
