# Owned by this open-source repo (busabase/busabase). The kapps sync
# (scripts/publish-busabase-repo.ts) PRESERVES `.github`, so it never overwrites
# this file — edit it here.
#
# Publishes busabase-cli + busabase-sdk + busabase to npm with provenance, from
# the public repo, on GitHub's official ubuntu-latest runner. It also publishes
# short-name alias packages busa-cli + busa-sdk from the same built artifacts.
# busabase depends on busabase-cli via workspace:*, so both publish with
# `pnpm publish` (rewrites the protocol), cli first. busabase-sdk is a standalone
# built library (its contract deps are bundled into dist), so it publishes
# independently. Idempotent: versions already on npm are skipped. The unscoped
# `busa` package name is already owned by another npm package, so the server
# package remains `busabase`.
name: Publish npm

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/busabase-cli/**"
      - "apps/busabase-sdk/**"
      - "apps/busabase/bin/**"
      - "apps/busabase/scripts/pack-standalone.mjs"
      - "apps/busabase/package.json"
      - "packages/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          registry-url: "https://registry.npmjs.org"

      # pnpm publish does not reliably read the token from the setup-node .npmrc;
      # write the expanded token into a workspace-root .npmrc pnpm always reads.
      - name: Configure npm auth for pnpm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      # Only install the server-side + library subtrees. The repo also holds
      # busabase-desktop and busabase-mobile (Expo/RN); installing those here would
      # pull React Native and run their native postinstall scripts for no reason on
      # an npm publish.
      - run: pnpm install --frozen-lockfile --filter "busabase..." --filter "busabase-cli..." --filter "busabase-sdk..."

      - name: Get versions
        id: v
        run: |
          echo "cli=$(node -p "require('./apps/busabase-cli/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "sdk=$(node -p "require('./apps/busabase-sdk/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "app=$(node -p "require('./apps/busabase/package.json').version")" >> "$GITHUB_OUTPUT"

      # busabase-sdk MUST build before busabase-cli: the CLI keeps busabase-sdk external
      # (a real runtime dep), so `node dist/cli.js --help` below resolves
      # busabase-sdk/dist/index.js at runtime — which only exists once the sdk is built.
      - name: Build busabase-sdk
        working-directory: apps/busabase-sdk
        run: |
          pnpm typecheck
          pnpm build
          test -f dist/index.js
          test -f dist/index.d.ts

      - name: Build busabase-cli
        working-directory: apps/busabase-cli
        run: |
          pnpm typecheck
          pnpm build
          test -f dist/cli.js
          node dist/cli.js --help

      - name: Build + assemble busabase
        working-directory: apps/busabase
        run: |
          NODE_OPTIONS=--max-old-space-size=4096 pnpm build
          pnpm pack:standalone
          test -n "$(find .next/standalone -path '*/apps/busabase/server.js' | head -1)"

      - name: Check published versions
        id: pub
        run: |
          npm view busabase-cli@${{ steps.v.outputs.cli }} version >/dev/null 2>&1 && echo "cli=true" >> "$GITHUB_OUTPUT" || echo "cli=false" >> "$GITHUB_OUTPUT"
          npm view busabase-sdk@${{ steps.v.outputs.sdk }} version >/dev/null 2>&1 && echo "sdk=true" >> "$GITHUB_OUTPUT" || echo "sdk=false" >> "$GITHUB_OUTPUT"
          npm view busabase@${{ steps.v.outputs.app }} version >/dev/null 2>&1 && echo "app=true" >> "$GITHUB_OUTPUT" || echo "app=false" >> "$GITHUB_OUTPUT"
          npm view busa-cli@${{ steps.v.outputs.cli }} version >/dev/null 2>&1 && echo "busa_cli=true" >> "$GITHUB_OUTPUT" || echo "busa_cli=false" >> "$GITHUB_OUTPUT"
          npm view busa-sdk@${{ steps.v.outputs.sdk }} version >/dev/null 2>&1 && echo "busa_sdk=true" >> "$GITHUB_OUTPUT" || echo "busa_sdk=false" >> "$GITHUB_OUTPUT"

      - name: Publish busabase-cli
        if: steps.pub.outputs.cli != 'true'
        working-directory: apps/busabase-cli
        run: pnpm publish --access public --no-git-checks

      - name: Publish busabase-sdk
        if: steps.pub.outputs.sdk != 'true'
        working-directory: apps/busabase-sdk
        run: pnpm publish --access public --no-git-checks

      - name: Publish busabase
        if: steps.pub.outputs.app != 'true'
        working-directory: apps/busabase
        run: pnpm publish --access public --no-git-checks

      - name: Publish busa-sdk alias
        if: steps.pub.outputs.busa_sdk != 'true'
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/busa-sdk"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -R apps/busabase-sdk/dist "$dest/dist"
          cat > "$dest/README.md" <<'EOF'
          # busa-sdk

          Short-name alias for [`busabase-sdk`](https://www.npmjs.com/package/busabase-sdk).

          ```sh
          npm install busa-sdk
          ```

          The package contains the same built SDK artifact and exports the same API as `busabase-sdk`.
          Use `busabase-sdk` for canonical docs and examples.
          EOF
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const source = JSON.parse(fs.readFileSync("apps/busabase-sdk/package.json", "utf8"));
          const pkg = {
            ...source,
            name: "busa-sdk",
            description: `${source.description} Short-name alias for busabase-sdk.`,
          };
          delete pkg.scripts;
          delete pkg.devDependencies;

          fs.writeFileSync(
            path.join(process.env.RUNNER_TEMP, "busa-sdk", "package.json"),
            `${JSON.stringify(pkg, null, 2)}\n`,
          );
          NODE
          npm publish "$dest" --access public --provenance --ignore-scripts

      - name: Publish busa-cli alias
        if: steps.pub.outputs.busa_cli != 'true'
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/busa-cli"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -R apps/busabase-cli/bin "$dest/bin"
          cp -R apps/busabase-cli/dist "$dest/dist"
          cat > "$dest/README.md" <<'EOF'
          # busa-cli

          Short-name alias for [`busabase-cli`](https://www.npmjs.com/package/busabase-cli).

          ```sh
          npx busa-cli --help
          ```

          The package contains the same built CLI artifact as `busabase-cli`, exposed through the
          `busa-cli` binary. Use `busabase-cli` for canonical docs and examples.
          EOF
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const source = JSON.parse(fs.readFileSync("apps/busabase-cli/package.json", "utf8"));
          const pkg = {
            ...source,
            name: "busa-cli",
            description: `${source.description} Short-name alias for busabase-cli.`,
            bin: {
              "busa-cli": "./bin/busabase-cli.mjs",
            },
            dependencies: {
              ...source.dependencies,
              "busabase-sdk": source.version,
            },
          };
          delete pkg.scripts;
          delete pkg.devDependencies;

          fs.writeFileSync(
            path.join(process.env.RUNNER_TEMP, "busa-cli", "package.json"),
            `${JSON.stringify(pkg, null, 2)}\n`,
          );
          NODE
          npm publish "$dest" --access public --provenance --ignore-scripts

      - name: Summary
        run: |
          {
            echo "## npm publish"
            echo "- busabase-cli@${{ steps.v.outputs.cli }} — already published: ${{ steps.pub.outputs.cli }}"
            echo "- busabase-sdk@${{ steps.v.outputs.sdk }} — already published: ${{ steps.pub.outputs.sdk }}"
            echo "- busabase@${{ steps.v.outputs.app }} — already published: ${{ steps.pub.outputs.app }}"
            echo "- busa-cli@${{ steps.v.outputs.cli }} — already published: ${{ steps.pub.outputs.busa_cli }}"
            echo "- busa-sdk@${{ steps.v.outputs.sdk }} — already published: ${{ steps.pub.outputs.busa_sdk }}"
          } >> "$GITHUB_STEP_SUMMARY"
