# Owned by this open-source repo (busabase/busabase). The kapps sync
# (scripts/publish-busabase-repo.ts) PRESERVES `.github`, so it never overwrites
# this file — edit it here.
#
# Publishes busabase-cli + busabase-sdk + busabase to npm with provenance, from
# the public repo, on GitHub's official ubuntu-latest runner. busabase depends on
# busabase-cli via workspace:*, so both publish with `pnpm publish` (rewrites the
# protocol), cli first. busabase-sdk is a standalone built library (its contract
# deps are bundled into dist), so it publishes independently. Idempotent: versions
# already on npm are skipped.
name: Publish npm

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/busabase-cli/**"
      - "apps/busabase-sdk/**"
      - "apps/busabase/bin/**"
      - "apps/busabase/scripts/pack-standalone.mjs"
      - "apps/busabase/package.json"
      - "packages/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          registry-url: "https://registry.npmjs.org"

      # pnpm publish does not reliably read the token from the setup-node .npmrc;
      # write the expanded token into a workspace-root .npmrc pnpm always reads.
      - name: Configure npm auth for pnpm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      # Only install the server-side + library subtrees. The repo also holds
      # busabase-desktop and busabase-mobile (Expo/RN); installing those here would
      # pull React Native and run their native postinstall scripts for no reason on
      # an npm publish.
      - run: pnpm install --frozen-lockfile --filter "busabase..." --filter "busabase-cli..." --filter "busabase-sdk..."

      - name: Get versions
        id: v
        run: |
          echo "cli=$(node -p "require('./apps/busabase-cli/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "sdk=$(node -p "require('./apps/busabase-sdk/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "app=$(node -p "require('./apps/busabase/package.json').version")" >> "$GITHUB_OUTPUT"

      # busabase-sdk MUST build before busabase-cli: the CLI keeps busabase-sdk external
      # (a real runtime dep), so `node dist/cli.js --help` below resolves
      # busabase-sdk/dist/index.js at runtime — which only exists once the sdk is built.
      - name: Build busabase-sdk
        working-directory: apps/busabase-sdk
        run: |
          pnpm typecheck
          pnpm build
          test -f dist/index.js
          test -f dist/index.d.ts

      - name: Build busabase-cli
        working-directory: apps/busabase-cli
        run: |
          pnpm typecheck
          pnpm build
          test -f dist/cli.js
          node dist/cli.js --help

      - name: Build + assemble busabase
        working-directory: apps/busabase
        run: |
          NODE_OPTIONS=--max-old-space-size=4096 pnpm build
          pnpm pack:standalone
          test -n "$(find .next/standalone -path '*/apps/busabase/server.js' | head -1)"

      - name: Check published versions
        id: pub
        run: |
          npm view busabase-cli@${{ steps.v.outputs.cli }} version >/dev/null 2>&1 && echo "cli=true" >> "$GITHUB_OUTPUT" || echo "cli=false" >> "$GITHUB_OUTPUT"
          npm view busabase-sdk@${{ steps.v.outputs.sdk }} version >/dev/null 2>&1 && echo "sdk=true" >> "$GITHUB_OUTPUT" || echo "sdk=false" >> "$GITHUB_OUTPUT"
          npm view busabase@${{ steps.v.outputs.app }} version >/dev/null 2>&1 && echo "app=true" >> "$GITHUB_OUTPUT" || echo "app=false" >> "$GITHUB_OUTPUT"

      - name: Publish busabase-cli
        if: steps.pub.outputs.cli != 'true'
        working-directory: apps/busabase-cli
        run: pnpm publish --access public --no-git-checks

      - name: Publish busabase-sdk
        if: steps.pub.outputs.sdk != 'true'
        working-directory: apps/busabase-sdk
        run: pnpm publish --access public --no-git-checks

      - name: Publish busabase
        if: steps.pub.outputs.app != 'true'
        working-directory: apps/busabase
        run: pnpm publish --access public --no-git-checks

      - name: Summary
        run: |
          {
            echo "## npm publish"
            echo "- busabase-cli@${{ steps.v.outputs.cli }} — already published: ${{ steps.pub.outputs.cli }}"
            echo "- busabase-sdk@${{ steps.v.outputs.sdk }} — already published: ${{ steps.pub.outputs.sdk }}"
            echo "- busabase@${{ steps.v.outputs.app }} — already published: ${{ steps.pub.outputs.app }}"
          } >> "$GITHUB_STEP_SUMMARY"
